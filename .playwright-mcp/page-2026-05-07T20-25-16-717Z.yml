          - text: We build food, the way
          - text: software gets built.
        - paragraph [ref=e137]: Innaya Nutri Foods is a Kerala-headquartered food technology company. We treat formulation, sourcing, and distribution as engineering problems — and ship millet-first, plant-protein nutrition under our consumer brand PAN8.
